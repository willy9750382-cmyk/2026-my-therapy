<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마음 테라피 플랫폼</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <style>
        /* [CSS] 디자인을 담당합니다 (인테리어) */
        :root { --main-color: #6d9773; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); }
        
        nav { display: flex; justify-content: space-between; padding: 15px 10%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; color: var(--main-color); font-size: 20px; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: #666; cursor: pointer; }

        .container { max-width: 1000px; margin: 50px auto; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .menu-card { background: white; padding: 30px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border: 1px solid var(--main-color); }

        /* 로그인 팝업창 디자인 */
        #login-modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: var(--main-color); color: white; border: none; cursor: pointer; }

        /* 감정 분석 창 디자인 */
        #analysis-window { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index: 2000; color: white; flex-direction: column; justify-content: center; align-items: center; }
        video { width: 80%; max-width: 500px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🌿 마음 테라피</div>
        <div class="nav-links">
            <a href="#">홈</a>
            <a href="#">감정일지</a>
            <a href="#">자료실</a>
            <a href="#">커뮤니티</a>
            <a id="login-nav-btn">로그인</a> </div>
    </nav>

    <div class="container">
        <div class="welcome-text">
            <h1 id="main-title">안녕하세요, 오늘의 마음은 어떤가요?</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-card" onclick="openAnalysis()"><h3>🔍 감정탐색 시작</h3></div>
            <div class="menu-card"><h3>📊 기분기록</h3></div>
            <div class="menu-card"><h3>📚 감정탐색 자료보기</h3></div>
            <div class="menu-card"><h3>✏️ 감정일기쓰기</h3></div>
            <div class="menu-card"><h3>🤝 커뮤니티 참여</h3></div>
            <div class="menu-card"><h3>🏠 홈으로</h3></div>
        </div>
    </div>

    <div id="login-modal">
        <div class="login-box">
            <h2>로그인</h2>
            <input type="text" id="id-input" placeholder="아이디 (admin)">
            <input type="password" id="pw-input" placeholder="비밀번호 (1234)">
            <button onclick="handleLogin()">로그인</button>
            <button onclick="closeLogin()" style="background:none; color:gray;">닫기</button>
        </div>
    </div>

    <div id="analysis-window">
        <h2 id="ai-status">AI가 얼굴을 분석하고 있습니다...</h2>
        <video id="video" autoplay muted></video>
        <h1 id="emotion-result">표정을 지어주세요</h1>
        <button onclick="closeAnalysis()" style="margin-top:20px; padding:10px 20px;">나가기</button>
    </div>

    <script>
        /* [JavaScript] 작동 기능을 담당합니다 (움직임) */
        
        // 1. 로그인 관련 기능
        const loginModal = document.getElementById('login-modal');
        const loginNavBtn = document.getElementById('login-nav-btn');

        // 로그인 버튼 누르면 팝업 띄우기
        loginNavBtn.onclick = () => { loginModal.style.display = 'flex'; };
        
        function closeLogin() { loginModal.style.display = 'none'; }

        function handleLogin() {
            const id = document.getElementById('id-input').value;
            const pw = document.getElementById('pw-input').value;
            if(id === "admin" && pw === "1234") {
                alert("로그인 성공!");
                loginModal.style.display = 'none';
                loginNavBtn.innerText = "admin님 (로그아웃)";
                document.getElementById('main-title').innerText = "admin님, 환영합니다!";
            } else {
                alert("정보가 틀렸습니다.");
            }
        }

        // 2. 감정 분석 기능
        async function openAnalysis() {
            // 로그인 확인 로직을 넣고 싶다면 여기에 추가 가능
            document.getElementById('analysis-window').style.display = 'flex';
            const video = document.getElementById('video');
            const resultText = document.getElementById('emotion-result');

            // 모델 로드
            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

            // 카메라 켜기
            navigator.mediaDevices.getUserMedia({ video: {} }).then(stream => {
                video.srcObject = stream;
                video.addEventListener('play', () => {
                    setInterval(async () => {
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                        if (detections.length > 0) {
                            const exp = detections[0].expressions;
                            const max = Object.keys(exp).reduce((a, b) => exp[a] > exp[b] ? a : b);
                            const map = { neutral: "평온함 😐", happy: "기쁨 😊", sad: "슬픔 😢", angry: "화남 😡" };
                            resultText.innerText = map[max] || max;
                        }
                    }, 500);
                });
            });
        }

        function closeAnalysis() {
            location.reload(); // 간단하게 페이지 새로고침으로 카메라 종료
        }
    </script>
</body>
</html>
