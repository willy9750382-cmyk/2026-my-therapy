<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마음 테라피 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        :root { --main-color: #6d9773; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--bg-color); }
        nav { display: flex; justify-content: space-between; padding: 15px 10%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; color: var(--main-color); font-size: 20px; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: #666; cursor: pointer; }
        .container { max-width: 1000px; margin: 50px auto; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .menu-card { background: white; padding: 30px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border: 1px solid var(--main-color); }
        #login-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: var(--main-color); color: white; border: none; cursor: pointer; margin-bottom: 5px; }
        #analysis-window { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index: 2000; color: white; flex-direction: column; justify-content: center; align-items: center; }
        video { width: 80%; max-width: 500px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🌿 마음 테라피</div>
        <div class="nav-links">
            <a href="#" onclick="location.reload()">홈</a>
            <a id="login-nav-btn">로그인</a>
        </div>
    </nav>

    <div class="container">
        <h1 id="main-title">안녕하세요, 오늘의 마음은 어떤가요?</h1>
        <div class="menu-grid">
            <div class="menu-card" onclick="openAnalysis()"><h3>🔍 감정탐색 시작</h3></div>
            <div class="menu-card"><h3>📊 기분기록</h3></div>
            <div class="menu-card"><h3>📚 자료보기</h3></div>
            <div class="menu-card"><h3>✏️ 감정일기</h3></div>
            <div class="menu-card"><h3>🤝 커뮤니티</h3></div>
            <div class="menu-card" onclick="location.reload()"><h3>🏠 홈으로</h3></div>
        </div>
    </div>

    <div id="login-modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="login-box" style="background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center;">
        <h2>로그인</h2>
        <input type="text" id="login-email" placeholder="이메일 주소">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button id="btn-login-submit" style="width: 100%; padding: 10px; background: #6d9773; color: white; border: none; cursor: pointer;">로그인</button>
        <p style="margin-top: 15px; font-size: 14px; color: #666;">
            계정이 없으신가요? <a href="#" onclick="openSignup()" style="color: #6d9773; font-weight: bold;">회원가입</a>
        </p>
        <button onclick="closeLogin()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">닫기</button>
    </div>
</div>


<div id="signup-modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center;">
    <div class="login-box" style="background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center;">
        <h2>회원가입</h2>
        <input type="text" id="signup-email" placeholder="사용할 이메일 주소">
        <input type="password" id="signup-pw" placeholder="비밀번호 (6자 이상)">
        <button id="btn-signup-submit" style="width: 100%; padding: 10px; background: #888; color: white; border: none; cursor: pointer;">가입하기</button>
        <p style="margin-top: 15px; font-size: 14px; color: #666;">
            이미 계정이 있나요? <a href="#" onclick="openLogin()" style="color: #6d9773; font-weight: bold;">로그인으로 돌아가기</a>
        </p>
        <button onclick="closeSignup()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">닫기</button>
    </div>
</div>

    <div id="analysis-window">
        <h2 id="ai-status">AI 분석 중...</h2>
        <video id="video" autoplay muted></video>
        <h1 id="emotion-result">표정을 지어주세요</h1>
        <button onclick="closeAnalysis()" style="margin-top:20px; padding:10px 20px;">나가기</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // [본인의 파이어베이스 설정으로 교체]
        const firebaseConfig = {
            apiKey: "AIzaSyBrIKNinceqzQjsW7qXoErePw7f3HSkvQQ",
            authDomain: "mind-therapy-89f3d.firebaseapp.com",
            projectId: "mind-therapy-89f3d",
            storageBucket: "mind-therapy-89f3d.firebasestorage.app",
            messagingSenderId: "966152181279",
            appId: "1:966152181279:web:86438a51e29027dc36a72a",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 창 열고 닫기 함수들을 전역(window)에 등록 ---
window.openLogin = () => {
    document.getElementById('signup-modal').style.display = 'none';
    document.getElementById('login-modal').style.display = 'flex';
};

window.openSignup = () => {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('signup-modal').style.display = 'flex';
};

window.closeLogin = () => { document.getElementById('login-modal').style.display = 'none'; };
window.closeSignup = () => { document.getElementById('signup-modal').style.display = 'none'; };

// --- 회원가입 버튼 클릭 ---
document.getElementById('btn-signup-submit').onclick = async () => {
    const email = document.getElementById('signup-email').value;
    const pw = document.getElementById('signup-pw').value;
    try {
        await createUserWithEmailAndPassword(auth, email, pw);
        alert("회원가입 성공!");
        closeSignup();
    } catch (e) { alert("가입 실패: " + e.message); }
};

// --- 로그인 버튼 클릭 ---
document.getElementById('btn-login-submit').onclick = async () => {
    const email = document.getElementById('login-email').value;
    const pw = document.getElementById('login-pw').value;
    try {
        await signInWithEmailAndPassword(auth, email, pw);
        alert("로그인 성공!");
        closeLogin();
    } catch (e) { alert("로그인 실패: 정보를 확인하세요."); }
};

// --- 상태 감지 (기존과 동일하되 버튼 연결만 수정) ---
onAuthStateChanged(auth, (user) => {
    const loginBtn = document.getElementById('login-nav-btn');
    if (user) {
        loginBtn.innerText = user.email.split('@')[0] + "님 (로그아웃)";
        loginBtn.onclick = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };
    } else {
        loginBtn.innerText = "로그인";
        loginBtn.onclick = openLogin; // 로그인 버튼 누르면 로그인창부터 뜨게 함
    }
});
        // 상태 감지
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-nav-btn');
            const title = document.getElementById('main-title');
            if (user) {
                const name = user.email.split('@')[0];
                loginBtn.innerText = `${name}님 (로그아웃)`;
                title.innerText = `${name}님, 환영합니다!`;
                loginBtn.onclick = () => signOut(auth);
            } else {
                loginBtn.innerText = "로그인";
                title.innerText = "안녕하세요, 오늘의 마음은 어떤가요?";
                loginBtn.onclick = () => document.getElementById('login-modal').style.display = 'flex';
            }
        });

        // openAnalysis 함수를 window 객체에 등록 (버튼 클릭 가능하게)
        window.openAnalysis = async function() {
            document.getElementById('analysis-window').style.display = 'flex';
            const video = document.getElementById('video');
            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';
            
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

            navigator.mediaDevices.getUserMedia({ video: {} }).then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    setInterval(async () => {
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                        if (detections.length > 0) {
                            const exp = detections[0].expressions;
                            const max = Object.keys(exp).reduce((a, b) => exp[a] > exp[b] ? a : b);
                            const map = { neutral: "평온함 😐", happy: "기쁨 😊", sad: "슬픔 😢", angry: "화남 😡" };
                            document.getElementById('emotion-result').innerText = map[max] || max;
                        }
                    }, 500);
                };
            });
        };

        window.closeAnalysis = () => { location.reload(); };
    </script>
</body>
</html>
