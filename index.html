<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>마음 테라피 플랫폼</title>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

<style>

:root {
    --main-color: #6d9773;
    --bg-color: #f8f9fa;
}

body {
    font-family: sans-serif;
    margin: 0;
    background: var(--bg-color);
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 10%;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.logo {
    font-weight: bold;
    color: var(--main-color);
    font-size: 20px;
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: #666;
    cursor: pointer;
}

.container {
    max-width: 1000px;
    margin: 50px auto;
    text-align: center;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 30px;
}

.menu-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.menu-card:hover {
    transform: translateY(-5px);
    border: 1px solid var(--main-color);
}

#analysis-window {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: black;
    z-index: 2000;
    color: white;

    flex-direction: column;
    justify-content: center;
    align-items: center;

    overflow-y: auto;
    padding: 20px;
    box-sizing: border-box;
}

video {
    width: 60%;
    max-width: 350px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.action-btn {
    margin-top: 10px;
    padding: 12px 20px;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

.page-box {
    padding: 40px;
    max-width: 900px;
    margin: auto;
}

textarea {
    width: 100%;
    height: 300px;
    padding: 15px;
    font-size: 16px;
}

</style>
</head>

<body>

<nav>
    <div class="logo">🌿 마음 테라피</div>

    <div class="nav-links">
        <a href="#" onclick="location.reload()">홈</a>
        <a id="login-nav-btn">로그인</a>
    </div>
</nav>

<div class="container">

<h1 id="main-title">
안녕하세요, 오늘의 마음은 어떤가요?
</h1>

<div class="menu-grid">

    <div class="menu-card" onclick="openAnalysis()">
        <h3>🔍 감정탐색 시작</h3>
    </div>

    <div class="menu-card" onclick="openMoodRecord()">
        <h3>📊 기분기록</h3>
    </div>

    <div class="menu-card" onclick="openResources()">
        <h3>📚 자료보기</h3>
    </div>

    <div class="menu-card" onclick="openDiary()">
        <h3>✏️ 감정일기</h3>
    </div>

    <div class="menu-card" onclick="openCommunity()">
        <h3>🤝 커뮤니티</h3>
    </div>

    <div class="menu-card" onclick="location.reload()">
        <h3>🏠 홈으로</h3>
    </div>

</div>
</div>

<!-- 로그인 모달 -->
<div id="login-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1000;
justify-content:center;
align-items:center;
">

<div class="login-box">

<h2>로그인</h2>

<input type="text" id="login-email" placeholder="이메일">

<input type="password" id="login-pw" placeholder="비밀번호">

<button id="btn-login-submit" class="action-btn">
로그인
</button>

<button onclick="openSignup()" class="action-btn">
회원가입
</button>

<button onclick="closeLogin()" class="action-btn">
닫기
</button>

</div>
</div>

<!-- 회원가입 모달 -->
<div id="signup-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1001;
justify-content:center;
align-items:center;
">

<div class="login-box">

<h2>회원가입</h2>

<input type="text" id="signup-email" placeholder="이메일">

<input type="password" id="signup-pw" placeholder="비밀번호">

<button id="btn-signup-submit" class="action-btn">
가입하기
</button>

<button onclick="closeSignup()" class="action-btn">
닫기
</button>

</div>
</div>

<!-- 감정 분석 -->
<div id="analysis-window">

<h2 id="ai-status">AI 분석 중...</h2>

<video id="video" autoplay muted></video>

<h1 id="emotion-result">
표정을 지어주세요
</h1>

<h3 id="speech-result">
음성을 기다리는 중...
</h3>

<button onclick="startVoiceRecognition()" class="action-btn">
🎤 음성 분석 시작
</button>

<button onclick="closeAnalysis()" class="action-btn">
나가기
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";


// Firebase 설정
const firebaseConfig = {

    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// 로그인창
window.openLogin = () => {
    document.getElementById('login-modal')
        .style.display = 'flex';
};

window.closeLogin = () => {
    document.getElementById('login-modal')
        .style.display = 'none';
};


// 회원가입창
window.openSignup = () => {
    document.getElementById('signup-modal')
        .style.display = 'flex';
};

window.closeSignup = () => {
    document.getElementById('signup-modal')
        .style.display = 'none';
};


// 로그인
document.getElementById('btn-login-submit')
.onclick = async () => {

    const email =
        document.getElementById('login-email').value;

    const pw =
        document.getElementById('login-pw').value;

    try {

        await signInWithEmailAndPassword(
            auth,
            email,
            pw
        );

        alert("로그인 성공!");

        closeLogin();

    } catch(e) {

        alert("로그인 실패");

    }

};


// 회원가입
document.getElementById('btn-signup-submit')
.onclick = async () => {

    const email =
        document.getElementById('signup-email').value;

    const pw =
        document.getElementById('signup-pw').value;

    try {

        await createUserWithEmailAndPassword(
            auth,
            email,
            pw
        );

        alert("회원가입 성공!");

        closeSignup();

    } catch(e) {

        alert("회원가입 실패");

    }

};


// 로그인 상태
onAuthStateChanged(auth, (user) => {

    const loginBtn =
        document.getElementById('login-nav-btn');

    if(user){

        loginBtn.innerText =
            user.email.split('@')[0] +
            "님 (로그아웃)";

        loginBtn.onclick = () => signOut(auth);

    } else {

        loginBtn.innerText = "로그인";

        loginBtn.onclick = openLogin;

    }

});


// 감정분석창
window.openAnalysis = async () => {

    document.getElementById('analysis-window')
        .style.display = 'flex';

    const video =
        document.getElementById('video');

    const MODEL_URL =
        'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';

    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);

    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

    const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true
        });

    video.srcObject = stream;

    video.onloadedmetadata = () => {

        setInterval(async () => {

            const detections =
                await faceapi
                .detectAllFaces(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                )
                .withFaceExpressions();

            if(detections.length > 0){

                const exp =
                    detections[0].expressions;

                const max =
                    Object.keys(exp).reduce((a,b)=>
                        exp[a] > exp[b] ? a : b
                    );

                const map = {

                    neutral:"평온함 😐",
                    happy:"기쁨 😊",
                    sad:"슬픔 😢",
                    angry:"화남 😡"

                };

                document.getElementById('emotion-result')
                    .innerText = map[max] || max;
            }

        },500);

    };

};


// 닫기
window.closeAnalysis = () => {
    location.reload();
};


// 음성인식
const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

let recognition;

if(SpeechRecognition){

    recognition = new SpeechRecognition();

    recognition.lang = 'ko-KR';

    recognition.continuous = true;

    recognition.interimResults = true;

}


// 음성 시작
window.startVoiceRecognition = async () => {

    if(!recognition) return;

    try {

        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        recognition.start();

        document.getElementById('speech-result')
            .innerText =
            "🎤 음성 듣는 중...";

    } catch(e){

        document.getElementById('speech-result')
            .innerText =
            "마이크 권한 필요";

    }

};


// 음성 결과
recognition.onresult = (event) => {

    let transcript = '';

    for(
        let i = event.resultIndex;
        i < event.results.length;
        i++
    ){

        transcript +=
            event.results[i][0].transcript;

    }

    document.getElementById('speech-result')
        .innerText =
        "🗣️ " + transcript;

};


// 기분기록
window.openMoodRecord = () => {

document.body.innerHTML = `

<div class="page-box">

<h1>📊 기분기록</h1>

<button onclick="alert('행복 😊')" class="action-btn">
행복 😊
</button>

<button onclick="alert('슬픔 😢')" class="action-btn">
슬픔 😢
</button>

<button onclick="location.reload()" class="action-btn">
홈으로
</button>

</div>

`;

};


// 자료보기
window.openResources = () => {

document.body.innerHTML = `

<div class="page-box">

<h1>📚 자료보기</h1>

<ul>
<li>스트레스 관리</li>
<li>명상 호흡법</li>
<li>우울감 극복</li>
</ul>

<button onclick="location.reload()" class="action-btn">
홈으로
</button>

</div>

`;

};


// 감정일기
window.openDiary = () => {

document.body.innerHTML = `

<div class="page-box">

<h1>✏️ 감정일기</h1>

<textarea
placeholder="오늘의 감정을 적어보세요..."
></textarea>

<br><br>

<button
onclick="alert('저장 완료!')"
class="action-btn"
>
저장하기
</button>

<button
onclick="location.reload()"
class="action-btn"
>
홈으로
</button>

</div>

`;

};


// 커뮤니티
window.openCommunity = () => {

document.body.innerHTML = `

<div class="page-box">

<h1>🤝 커뮤니티</h1>

<p>서로의 감정을 나눠보세요.</p>

<div style="
background:#f5f5f5;
padding:20px;
border-radius:10px;
">

😊 오늘 하루도 수고했어요!

</div>

<br>

<button
onclick="location.reload()"
class="action-btn"
>
홈으로
</button>

</div>

`;

};

</script>

</body>
</html>
